name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff bandit pip-audit

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest

      - name: Static security scan
        run: bandit -q -r src

      - name: Prepare runtime dependency audit
        id: prepare_audit
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          deps = pyproject.get("project", {}).get("dependencies", [])
          pathlib.Path("runtime-requirements.txt").write_text(
              "\n".join(deps),
              encoding="utf-8",
          )
          print(f"Runtime dependencies found: {len(deps)}")
          pathlib.Path(".audit-count").write_text(str(len(deps)), encoding="utf-8")
          PY
          echo "runtime_dep_count=$(cat .audit-count)" >> "$GITHUB_OUTPUT"

      - name: Dependency vulnerability scan
        if: steps.prepare_audit.outputs.runtime_dep_count != '0'
        run: pip-audit -r runtime-requirements.txt --strict

      - name: Dependency vulnerability scan (no runtime dependencies)
        if: steps.prepare_audit.outputs.runtime_dep_count == '0'
        run: echo "No runtime dependencies to audit."
