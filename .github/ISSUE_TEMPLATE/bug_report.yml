name: Bug report
description: Report a bug in pyscope-local-analyzer
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Analyze ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
